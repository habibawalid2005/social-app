<div class="mx-auto max-w-8xl px-3 py-3.5">
  <main class="min-w-0">

    <section class="rounded-xl border border-[#323436] bg-[#202225] shadow sm:rounded-2xl">

      <!-- HEADER -->
      <div class="border-b border-[#323436] p-4 sm:p-5">

        <div class="flex flex-wrap items-start justify-between gap-3">

          <div>
            <h2 class="text-xl font-black text-white sm:text-2xl">
              Notifications
            </h2>

            <p class="mt-1 text-sm text-gray-400">
              Realtime updates for likes, comments, shares, and follows.
            </p>
          </div>

          <button
            (click)="markAllNotificationsAsReadItem()"
            class="inline-flex w-full cursor-pointer items-center justify-center gap-2 rounded-lg border border-[#323436] bg-[#181A1C] px-3 py-2 text-sm font-bold text-gray-300 transition hover:bg-[#2D2F31] disabled:cursor-not-allowed disabled:opacity-60 sm:w-auto"
          >
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15"
              viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 6 7 17l-5-5"></path>
              <path d="m22 10-7.5 7.5L13 16"></path>
            </svg>
            Mark all as read
          </button>

        </div>


        <!-- TABS -->
        <div class="mt-4 grid grid-cols-2 gap-2 sm:flex sm:items-center">

          <button
            (click)="showNotifications('all')"
            class="rounded-full cursor-pointer px-4 py-1.5 text-sm font-bold transition"
            [class]="activeTab==='all'
              ? 'bg-gradient-to-r from-[#F62E8E] to-[#AC1AF0] text-white'
              : 'bg-[#181A1C] text-gray-300 hover:bg-[#2D2F31]'"
          >
            All
          </button>


          <button
            (click)="showNotifications('unread')"
            class="inline-flex cursor-pointer items-center gap-2 rounded-full px-4 py-1.5 text-sm font-bold transition"
            [class]="activeTab==='unread'
              ? 'bg-gradient-to-r from-[#F62E8E] to-[#AC1AF0] text-white'
              : 'bg-[#181A1C] text-gray-300 hover:bg-[#2D2F31]'"
          >
            Unread

            @if (unreadNotificationsCountService.updatedUnreadCount>0) {
              <span
                class="rounded-full px-2 py-0.5 text-xs"
                [class]="activeTab==='unread'
                  ? 'bg-white/20 text-white'
                  : 'bg-[#F62E8E] text-white'"
              >
                {{unreadNotificationsCountService.updatedUnreadCount}}
              </span>
            }

          </button>

        </div>

      </div>


      <!-- LIST -->
      <div class="grid gap-2 p-3 sm:p-4">

        @if (loading) {

          @for (item of [1,2,3,4]; track $index) {
            <app-loading-skeleton [loadingType]="'suggested user'"></app-loading-skeleton>
          }

        } @else {

          @for (item of filteredList; track item._id) {
            <app-notification-item [notification]="item"></app-notification-item>
          }

          @empty {

            <div class="space-y-2 p-3 sm:p-4">
              <div class="rounded-xl border border-[#323436] bg-[#181A1C] p-8 text-center">
                <p class="text-sm font-semibold text-gray-400">
                  No{{activeTab==='unread'?' unread':''}} notifications yet.
                </p>
              </div>
            </div>

          }

        }

      </div>

    </section>

  </main>
</div>
