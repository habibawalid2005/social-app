<button
  type="button"
  (click)="showSuggested()"
  class="inline-flex xl:hidden mb-4 w-full items-center justify-between rounded-2xl border border-[#323436] bg-[#202225] px-4 py-3 text-left shadow-sm"
>
  <span class="inline-flex items-center gap-2 text-sm font-bold text-white">

    <i class="fa-solid fa-user-group text-[#F62E8E] text-[1.1rem]"></i>
    Suggested Friends

  </span>

  <span class="inline-flex items-center gap-2">

    <span class="rounded-full bg-[#181A1C] px-2 py-0.5 text-xs font-bold text-gray-400">
      {{SuggestionList.length}}
    </span>

    <span class="text-xs font-bold text-[#F62E8E]">
      {{isHidden? 'show':'hide'}}
    </span>

  </span>

</button>


<aside
[class.hidden]="isHidden"
class="bg-[#202225] sticky xl:block top-21 rounded-3xl shadow-sm border border-[#323436] p-4 font-sans"
>

  <!-- HEADER -->
  <div class="flex items-center justify-between mb-4 px-1">

    <div class="flex items-center gap-2">

      <i class="fa-solid fa-user-group text-[#F62E8E] text-[1.1rem]"></i>

      <h2 class="font-bold text-white text-[17px]">
        Suggested Friends
      </h2>

    </div>

    <span class="bg-[#181A1C] text-gray-400 text-xs font-bold px-2.5 py-1 rounded-full">
      {{SuggestionList.length}}
    </span>

  </div>


  <!-- SEARCH -->
  <app-search-friends-input
  (suggestedList)="getSearchSuggestionsData($event)">
  </app-search-friends-input>


  <!-- LIST -->
  <div class="grid gap-3 grid-cols-1 pb-1">

    @if (loading) {

      @for (item of [1,2,3,4]; track $index) {

        <app-loading [loadingType]="'suggested user'"></app-loading>

      }

    }

    @else {

      @for (user of SuggestionList; track user._id) {

        <app-sugested-user
        (functionCall)="getSearchSuggestionsData(inputValue)"
        [user]="user">
        </app-sugested-user>

      }

      @empty {

        <p class="text-sm text-gray-400">
          No users matched your search.
        </p>

      }

    }

  </div>


  <!-- BUTTON -->
  <button
  routerLink="/suggestions"
  class="w-full cursor-pointer mt-3 py-2.5 bg-[#181A1C] border border-[#323436] rounded-xl text-[14px] font-bold text-gray-300 hover:bg-[#2D2F31] hover:border-[#444] transition-all"
  >

    View more

  </button>

</aside>
