    @if (content.invalid && content.hasError('minlength')) {
      <div
        class="mt-3 rounded-sm border border-rose-200 bg-rose-50 px-3 py-2 text-xs font-semibold text-rose-700"
      >
        Comment must be at least 2 characters.
      </div>
    }
    <form (submit)="submitForm($event)" class="mt-3">
    @if (type==='reply') {}
      <div class="flex items-start gap-2">
        <img
          [alt]="userDataService.name"
          class="h-9 w-9 rounded-full object-cover"
          [src]="userDataService.profilePhotoUrl"
        />
        <div
          class="w-full rounded-2xl border border-slate-200 bg-secondColor px-2.5 py-1.5 focus-within:border-[#c7dafc] focus-within:bg-white"
          data-comment-mention-root="true"
        >
          <textarea
            [formControl]="content"
            placeholder="{{type==='comment'?`Comment as ${userDataService.name}...`:'Write a reply..'}}"
            rows="1"
            class="max-h-35 min-h-10 w-full border-0 resize-none bg-transparent px-2 py-1.5 text-sm leading-5 outline-none placeholder:text-slate-500"
            style="height: 40px"
          ></textarea>
          <div class="mt-1 flex items-center justify-between">
            <div class="flex items-center gap-1">
              <label
                class="inline-flex cursor-pointer items-center justify-center rounded-full p-2 text-slate-500 transition hover:bg-slate-200 hover:text-emerald-600"
                ><svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="lucide lucide-image"
                  aria-hidden="true"
                >
                  <rect width="18" height="18" x="3" y="3" rx="2" ry="2"></rect>
                  <circle cx="9" cy="9" r="2"></circle>
                  <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"></path></svg
                ><input
                  (change)="readCommentImg($event)"
                  accept="image/*"
                  class="hidden"
                  type="file"
              /></label>
            </div>
            <button
              class="inline-flex cursor-pointer h-9 w-9 items-center justify-center rounded-full bg-[#1877f2] text-white shadow-sm transition hover:bg-[#166fe5] disabled:cursor-not-allowed disabled:bg-[#9ec5ff] disabled:opacity-100"
              [disabled]="(!imgUrl && !content.value) ||isloading"
            >
             @if (isloading) {
              <span class="h-3.5 w-3.5 animate-spin rounded-full border-2 border-white border-t-transparent"></span>
             }@else {
               <svg
                xmlns="http://www.w3.org/2000/svg"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="lucide lucide-send-horizontal"
                aria-hidden="true"
              >
                <path
                  d="M3.714 3.048a.498.498 0 0 0-.683.627l2.843 7.627a2 2 0 0 1 0 1.396l-2.842 7.627a.498.498 0 0 0 .682.627l18-8.5a.5.5 0 0 0 0-.904z"
                ></path>
                <path d="M6 12h16"></path>
              </svg>
             }
            </button>
          </div>
        </div>
      </div>
      @if (imgUrl) {
        <div class="relative mt-2">
          <img
            alt="Comment preview"
            class="max-h-52 w-full rounded-lg object-cover"
            [src]="imgUrl"
          /><button
            (click)="closeImg()"
            type="button"
            class="absolute right-2 cursor-pointer top-2 rounded-full bg-black/60 p-1 text-white"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-x"
              aria-hidden="true"
            >
              <path d="M18 6 6 18"></path>
              <path d="m6 6 12 12"></path>
            </svg>
          </button>
        </div>
      }
    </form>
