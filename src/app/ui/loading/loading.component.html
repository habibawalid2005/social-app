@if (loadingType==='single post') {
    <div class="rounded-2xl my-3 border border-slate-200 bg-white p-5 shadow-sm space-y-3">
    <div class="flex items-center gap-3">
      <div class="h-10 w-10 rounded-full skeleton shrink-0"></div>
      <div class="flex-1 space-y-2">
        <div class="skeleton h-3 w-32"></div>
        <div class="skeleton h-2.5 w-20"></div>
      </div>
    </div>
    <div class="skeleton h-3 w-full"></div>
    <div class="skeleton h-3 w-5/6"></div>
    <div class="skeleton h-3 w-3/4"></div>
    <div class="skeleton h-36 w-full rounded-xl"></div>
  </div>
}
@else{
    <div [class.mt-3]="loadingType==='posts'"
     class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm space-y-3">
    <div class="flex items-center gap-3">
      <div class="h-10 w-10 rounded-full skeleton shrink-0"></div>
      <div class="flex-1 space-y-2">
        <div class="skeleton h-3 w-28"></div>
        <div class="skeleton h-2.5 w-16"></div>
      </div>
    </div>
    @if (loadingType==='posts') {
        <div class="skeleton h-3 w-full"></div>
        <div class="skeleton h-3 w-4/5"></div>
    }
    
  </div>

}
